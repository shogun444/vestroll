services:
  - type: web
    name: vestroll
    env: node
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm drizzle-kit push && pnpm run start
    cacheDirectories:
      - .next/cache
      - node_modules
      - .pnpm-store
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vestroll-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vestroll-redis
          property: connectionString
      - key: TRANSACTION_CACHE_BACKEND
        value: db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: APPLE_CLIENT_ID
        sync: false
      - key: EMAIL_FROM
        value: noreply@vestroll.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: CDN_URL
        sync: false
      - key: MONNIFY_API_KEY
        sync: false
      - key: MONNIFY_SECRET_KEY
        sync: false
      - key: MONNIFY_BASE_URL
        value: https://sandbox.monnify.com
      - key: MONNIFY_CONTRACT_CODE
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_BASE_URL
        value: https://api.flutterwave.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: SIMULATE_SLOW_API
        value: "false"

  - type: redis
    name: vestroll-redis
    plan: free
    ipAllowList: []

databases:
  - name: vestroll-db
    plan: free
